name: CI & Publish

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit

  publish:
    # Publishes only when package.json holds a version not yet on npm.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm trusted publishing (OIDC) + provenance
      contents: write   # tag + GitHub release
    steps:
      - uses: actions/checkout@v4
      # No registry-url here: setup-node would write a placeholder _authToken into
      # .npmrc that shadows the OIDC trusted-publishing flow. Node 24 ships npm ≥ 11.6,
      # which handles trusted publishing natively.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check whether this version needs publishing
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "igc-viewer@$VERSION" version >/dev/null 2>&1; then
            echo "igc-viewer@$VERSION already on npm — skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version.outputs.publish == 'true'
        run: npm publish --provenance

      - name: Tag and create GitHub release
        if: steps.version.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "v$VERSION" || true
          git push origin "v$VERSION" || true
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes || true
